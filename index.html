<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Today's Practice</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2A1E14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Today's Practice" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design Tokens ─────────────────────────────── */
    :root {
      --orange:     #EC671B;
      --terracotta: #D2691E;
      --blue:       #1B6EC8;
      --crimson:    #C83232;
      --brown:      #8B5E3C;
      --bg:         #F4EFE6;
      --card:       #FFFFFF;
      --cream:      #FCEFE0;
      --cream-2:    #F7E4CF;
      --dark:       #2A1E14;
      --mid:        #5A4A3C;
      --light:      #A6957F;
      --border:     #E7DCCB;
      --muted:      #EFE7D9;
      --success:    #2E7D32;
      --font-head:  'Roboto', sans-serif;
      --font-body:  'Open Sans', sans-serif;
      --radius:     16px;
      --shadow:     0 2px 14px rgba(90,60,30,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* App-shell layout: header + scrollable view + tab bar, no page scroll */
    html, body { height: 100%; overflow: hidden; -webkit-text-size-adjust: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--dark);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ─── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding:
        calc(env(safe-area-inset-top) + 12px)
        max(20px, env(safe-area-inset-right)) 12px
        max(20px, env(safe-area-inset-left));
      background: #995F2F;
      flex-shrink: 0;
      transition: box-shadow 0.3s;
      z-index: 20;
    }
    .header.scrolled { box-shadow: 0 3px 22px rgba(90,40,10,0.35); }

    /* ─── Views + tab bar ────────────────────────────── */
    .app-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .view {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .view.hidden { display: none; }

    /* Bottom tab bar */
    .tab-bar {
      display: flex;
      background: var(--dark);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-bottom: env(safe-area-inset-bottom);
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.38);
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-family: var(--font-head);
      font-weight: 700;
      transition: color 0.18s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .tab.active { color: var(--orange); }
    .tab svg { width: 22px; height: 22px; }
    .header-brand { display: flex; align-items: center; gap: 11px; min-width: 0; }
    .header-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }
    /* soft, warm, never alarming */
    .header-left {
      text-align: right;
      font-size: 12px;
      line-height: 1.35;
      color: rgba(255,255,255,0.65);
      font-weight: 400;
    }
    .header-left b {
      font-weight: 600;
      color: rgba(255,255,255,0.92);
    }

    /* ─── Single calm column ─────────────────────────── */
    .stage {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 18px 16px;
      min-height: 100%;
    }
    .card { width: 100%; max-width: 460px; display: flex; flex-direction: column; }
    #view-today { display: flex; flex-direction: column; }

    /* ─── Compact hero: left col + right col ─────────── */
    .hero-flex {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 20px;
    }
    .hero-left  { flex: 1; min-width: 0; }
    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .greeting {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 19px;
      color: var(--dark);
      letter-spacing: -0.2px;
    }
    .today-date {
      font-size: 13px;
      color: var(--mid);
      margin-top: 3px;
      margin-bottom: 14px;
    }

    /* 4 live completion dots — left col, below date */
    .today-dots {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tdot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(140,94,60,0.18);
      transition: background 0.25s, transform 0.2s;
      flex-shrink: 0;
    }
    .tdot.on              { transform: scale(1.15); }
    .tdot.on.td-surya     { background: var(--orange); }
    .tdot.on.td-shambhavi { background: var(--crimson); }
    .tdot.on.td-bhuta     { background: var(--blue); }
    .tdot.on.td-devi      { background: var(--brown); }
    .tdot-label {
      font-size: 11px;
      color: var(--light);
      margin-left: 2px;
      font-weight: 600;
    }

    /* Day number + sun — right col */
    .day-num {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 60px;
      line-height: 0.88;
      color: var(--orange);
      letter-spacing: -2px;
    }
    .day-sun {
      width: 56px; height: 56px;
      color: var(--orange);
      opacity: 0.2;
    }

    /* ─── Practice cards (tap to complete) ───────────── */
    .practices { display: flex; flex-direction: column; gap: 12px; }

    .pcard {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 17px 18px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
      transition: background 0.22s, border-color 0.22s, transform 0.12s;
    }
    .pcard.tap { cursor: pointer; }
    .pcard.tap:active { transform: scale(0.985); }

    .pcard.s-surya     { --pc: var(--orange); }
    .pcard.s-shambhavi { --pc: var(--crimson); }
    .pcard.s-bhuta     { --pc: var(--blue); }
    .pcard.s-devi      { --pc: var(--brown); }

    /* done = warm, filled, glad — never a grey toggle */
    .pcard.done                  { border-color: rgba(140,94,60,0.35); background: #FBF5EE; }
    .pcard.done.s-surya          { border-color: rgba(236,103,27,0.4); background: #FFF5EE; }
    .pcard.done.s-shambhavi      { border-color: rgba(200,50,50,0.35); background: #FFF2F2; }
    .pcard.done.s-bhuta          { border-color: rgba(27,110,200,0.35); background: #F0F5FF; }
    .pcard.done.s-devi           { border-color: rgba(139,94,60,0.40); background: #FBF6F0; }

    .pglyph {
      width: 30px; height: 30px;
      flex-shrink: 0;
      color: var(--pc);
      transition: transform 0.2s;
    }
    .pcard.done .pglyph { transform: scale(1.08); }

    .pmeta { flex: 1; min-width: 0; }
    .pname {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15.5px;
      color: var(--dark);
    }
    .pdesc {
      font-size: 12px;
      color: var(--light);
      margin-top: 2px;
    }

    /* completion ring on the right (inviting, not a switch) */
    .pcheck {
      width: 28px; height: 28px;
      flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid var(--border);
      position: relative;
      transition: all 0.22s;
    }
    .pcard.done .pcheck {
      background: var(--pc);
      border-color: var(--pc);
      animation: pop 0.32s ease;
    }
    .pcard.done .pcheck::after {
      content: '✓';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 15px; font-weight: 700;
    }
    @keyframes pop {
      0% { transform: scale(0.7); }
      55% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    /* Surya cycle counter (kept — useful in-session info) */
    .counter { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
    .cbtn {
      width: 32px; height: 32px;
      border: 1.5px solid var(--border);
      background: transparent;
      border-radius: 50%;
      font-size: 18px; line-height: 1;
      color: var(--mid);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cbtn:active { background: var(--muted); }
    .cval {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 22px;
      width: 22px;
      text-align: center;
      color: var(--orange);
    }

    /* ─── CTA ─────────────────────────────────────────── */
    .cta-wrap { margin-top: auto; padding-top: 18px; }
    .cta {
      width: 100%;
      padding: 17px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
    }
    .cta:not(:disabled):active { transform: scale(0.99); }
    .cta:not(:disabled) { box-shadow: 0 6px 20px rgba(236,103,27,0.28); }
    .cta:disabled {
      background: var(--muted);
      color: var(--light);
      cursor: default;
    }
    .cta.pulse { animation: ctaPulse 0.5s ease; }
    @keyframes ctaPulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }
    .save-msg {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      min-height: 18px;
      color: var(--light);
    }
    .save-msg.ok  { color: var(--success); font-weight: 600; }
    .save-msg.err { color: var(--terracotta); font-weight: 600; }

    /* ─── History section ───────────────────────────── */
    .history {
      background: var(--muted);
      padding: 22px 18px 44px;
      display: flex;
      justify-content: center;
      min-height: 100%;
    }
    .history-inner {
      width: 100%;
      max-width: 460px;
    }
    .history-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .history-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      color: var(--dark);
    }
    .history-range {
      font-size: 11px;
      color: var(--light);
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 10px 10px;
    }
    .stat-num {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 22px;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 9.5px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--light);
      margin-top: 4px;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-bottom: 16px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--mid);
    }
    .leg-glyph { width: 16px; height: 16px; }
    .leg-glyph.s-surya     { color: var(--orange); }
    .leg-glyph.s-shambhavi { color: var(--crimson); }
    .leg-glyph.s-bhuta     { color: var(--blue); }
    .leg-glyph.s-devi      { color: var(--brown); }

    /* Day grid */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
      gap: 7px;
    }
    .day-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 6px 7px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .day-card:hover:not(.future) {
      border-color: var(--orange);
      box-shadow: 0 2px 8px rgba(236,103,27,0.15);
      transform: translateY(-1px);
    }
    .day-card.today  { border-color: var(--orange); border-width: 2px; }
    .day-card.today::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--orange);
    }
    .day-card.future { opacity: 0.32; cursor: default; pointer-events: none; }
    .day-card.logged { background: #FCF8F1; }
    .day-card.complete {
      background: linear-gradient(150deg, #FCEFE0, #FBF6EE);
      border-color: rgba(236,103,27,0.3);
    }
    .day-card.milestone::before {
      content: '✦';
      position: absolute; top: 3px; right: 4px;
      font-size: 8px;
      color: var(--crimson);
      opacity: 0.6;
    }
    .dc-num {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      line-height: 1;
    }
    .dc-date {
      font-size: 8.5px;
      color: var(--light);
      text-align: center;
      margin: 2px 0 6px;
    }
    .dc-glyphs {
      display: flex;
      justify-content: center;
      gap: 3px;
    }
    .dcg {
      width: 13px; height: 13px;
      color: rgba(140,94,60,0.18);
      transition: color 0.18s;
    }
    .dcg.on.s-surya     { color: var(--orange); }
    .dcg.on.s-shambhavi { color: var(--crimson); }
    .dcg.on.s-bhuta     { color: var(--blue); }
    .dcg.on.s-devi      { color: var(--brown); }

    /* Modal */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.42);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 18px;
      padding: 26px;
      width: 340px;
      max-width: 100%;
      box-shadow: 0 12px 40px rgba(90,60,30,0.18);
      position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--muted); border: none;
      width: 28px; height: 28px;
      border-radius: 50%; font-size: 16px;
      color: var(--mid);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-title  { font-family: var(--font-head); font-weight: 700; font-size: 19px; margin-bottom: 2px; }
    .modal-date   { font-size: 12px; color: var(--light); margin-bottom: 18px; }
    .modal-row    { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--muted); }
    .modal-row:last-child { border-bottom: none; }
    .modal-label  { font-family: var(--font-head); font-weight: 700; font-size: 13.5px; }
    .modal-val    { font-size: 12px; margin-top: 2px; }
    .modal-dot    { width: 9px; height: 9px; border-radius: 50%; }

    @media (max-width: 600px) {
      .greeting { font-size: 23px; }
      .header-title { font-size: 15px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- ── Glyph defs (earthy line icons) ── -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="g-surya" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/>
      <line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/>
      <line x1="5.3" y1="5.3" x2="7" y2="7"/><line x1="17" y1="17" x2="18.7" y2="18.7"/>
      <line x1="18.7" y1="5.3" x2="17" y2="7"/><line x1="7" y1="17" x2="5.3" y2="18.7"/>
    </g>
  </symbol>
  <symbol id="g-shambhavi" viewBox="0 0 24 24">
    <path d="M3 12 C7 6.5, 17 6.5, 21 12 C17 17.5, 7 17.5, 3 12 Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
  </symbol>
  <symbol id="g-bhuta" viewBox="0 0 24 24">
    <g fill="currentColor">
      <circle cx="12" cy="5" r="1.8"/><circle cx="18.66" cy="9.84" r="1.8"/>
      <circle cx="16.11" cy="17.66" r="1.8"/><circle cx="7.89" cy="17.66" r="1.8"/>
      <circle cx="5.34" cy="9.84" r="1.8"/>
    </g>
  </symbol>
  <symbol id="g-devi" viewBox="0 0 24 24">
    <path d="M4 6.5 L20 6.5 L12 20 Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    <circle cx="12" cy="11" r="1.7" fill="currentColor"/>
  </symbol>
  <symbol id="g-flame" viewBox="0 0 24 24">
    <path d="M12 3 C12 3 7 8 7 13 C7 16.3 9.2 18.5 12 18.5 C14.8 18.5 17 16.3 17 13 C17 8 12 3 12 3 Z" fill="currentColor"/>
  </symbol>
</svg>

<!-- ── Header ── -->
<header class="header" id="header">
  <div class="header-brand">
    <div class="header-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-linecap="round">
        <path d="M12 2 C8.5 5.5, 7.5 9.5, 8.5 14 C9.5 17, 11 18.5, 12 19" stroke-width="1.65"/>
        <path d="M12 2 C15.5 5.5, 16.5 9.5, 15.5 14 C14.5 17, 13 18.5, 12 19" stroke-width="1.65"/>
        <circle cx="12" cy="10.5" r="2.6" fill="#fff" stroke="none"/>
        <path d="M10.5 19.5 C10 21, 9.5 21.8, 9 22.3" stroke-width="1.4"/>
        <path d="M12 20 L12 23" stroke-width="1.4"/>
        <path d="M13.5 19.5 C14 21, 14.5 21.8, 15 22.3" stroke-width="1.4"/>
      </svg>
    </div>
    <div class="header-title">Today's Practice</div>
  </div>
  <div class="header-left" id="header-left">&nbsp;</div>
</header>

<!-- ── App body: swappable views ── -->
<div class="app-body">

<!-- VIEW: Today -->
<div class="view" id="view-today">
<main class="stage">
  <div class="card">

    <!-- Compact hero: greeting+date+dots left, day number+sun right -->
    <div class="hero-flex">
      <div class="hero-left">
        <div class="greeting" id="greeting">&nbsp;</div>
        <div class="today-date" id="today-date">&nbsp;</div>
        <div class="today-dots">
          <span class="tdot td-surya"     id="td-surya"></span>
          <span class="tdot td-shambhavi" id="td-shambhavi"></span>
          <span class="tdot td-bhuta"     id="td-bhuta"></span>
          <span class="tdot td-devi"      id="td-devi"></span>
          <span class="tdot-label" id="td-label">0 of 4</span>
        </div>
      </div>
      <div class="hero-right" id="day-row">
        <div class="day-num" id="day-num">—</div>
        <svg class="day-sun" viewBox="0 0 24 24" aria-hidden="true">
          <use href="#g-surya"/>
        </svg>
      </div>
    </div>

    <div class="practices">
      <!-- Surya Kriya — keeps its cycle counter -->
      <div class="pcard s-surya" id="pc-surya">
        <svg class="pglyph"><use href="#g-surya"/></svg>
        <div class="pmeta">
          <div class="pname">Surya Kriya</div>
          <div class="pdesc">Number of cycles</div>
        </div>
        <div class="counter">
          <button class="cbtn" onclick="adjCycles(-1)" aria-label="One fewer cycle">−</button>
          <span class="cval" id="cval">0</span>
          <button class="cbtn" onclick="adjCycles(1)" aria-label="One more cycle">+</button>
        </div>
      </div>

      <!-- Shambhavi -->

<!-- ═══════════════════════════════════════════════════ SCRIPT -->
<script>
/* ============================================================
   CONFIG
   ============================================================ */
const CFG = {
  START_DATE: '2026-06-10',
  TOTAL_DAYS: 111,
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzZDXZzoJxqRMBK3hfYphg07ThIyNKclR5jyRpP7wLmxK7A6PzCuKMJDsdRFVuAoHwl/exec',
};

/* ============================================================
   STATE
   ============================================================ */
const S = {
  cycles: 0,
  shambhavi: false,
  bhuta: false,
  devi: false,
  data: {},        // { 'YYYY-MM-DD': { cycles, shambhavi, bhuta, devi } }
  todayKey: '',
};

/* ============================================================
   DATE HELPERS
   ============================================================ */
function parseLocal(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function toKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function todayKey() { return toKey(new Date()); }
function dayNum(key) {
  return Math.round((parseLocal(key) - parseLocal(CFG.START_DATE)) / 864e5) + 1;
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  S.todayKey = todayKey();
  const now  = new Date();

  // Greeting (time-aware)
  const h = now.getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = greet;

  // Date — clean, warm, present (no day numbers, no program framing)
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  // Day number + sun row
  const num  = dayNum(S.todayKey);
  const dayNumEl = document.getElementById('day-num');
  const dayRow   = document.getElementById('day-row');
  if (num >= 1 && num <= CFG.TOTAL_DAYS) {
    dayNumEl.textContent = num;
  } else {
    dayRow.style.display = 'none';
  }

  // Soft countdown, top-right
  const left = CFG.TOTAL_DAYS - num + 1;
  const el   = document.getElementById('header-left');
  if (num < 1) {
    const until = 1 - num;
    el.innerHTML = `begins in <b>${until}</b> day${until === 1 ? '' : 's'}`;
  } else if (num > CFG.TOTAL_DAYS) {
    el.innerHTML = 'Devi sadhana complete';
  } else {
    el.innerHTML = `<b>${left}</b> day${left === 1 ? '' : 's'} left for Devi`;
  }

  loadData();
}

/* ============================================================
   PRACTICE INTERACTIONS
   ============================================================ */
function toggleP(name) {
  S[name] = !S[name];
  buzz(10);
  renderCards();
}

function adjCycles(d) {
  S.cycles = Math.max(0, Math.min(3, S.cycles + d));
  buzz(10);
  renderCards();
}

function renderCards() {
  document.getElementById('cval').textContent = S.cycles;

  const state = {
    surya:     S.cycles >= 1,
    shambhavi: S.shambhavi,
    bhuta:     S.bhuta,
    devi:      S.devi,
  };

  Object.entries(state).forEach(([k, on]) => {
    document.getElementById('pc-' + k).classList.toggle('done', on);
    document.getElementById('td-' + k).classList.toggle('on',   on);
  });

  // Completion dots label
  const count = Object.values(state).filter(Boolean).length;
  document.getElementById('td-label').textContent = count + ' of 4';

  document.getElementById('cta').disabled =
    !(state.surya || state.shambhavi || state.bhuta || state.devi);
}

/* Haptic feedback (Android; ignored elsewhere) */
function buzz(p) { try { if (navigator.vibrate) navigator.vibrate(p); } catch(e) {} }

/* ============================================================
   LOAD / SYNC
   ============================================================ */
function loadData() {
  // Render instantly from local cache
  try {
    const stored = localStorage.getItem('sadhana-tracker-data');
    if (stored) S.data = JSON.parse(stored);
  } catch(e) { console.warn('Cache read failed:', e.message); }
  fillToday();
  renderGrid();
  updateStats();
  syncFromCloud();
}

function fillToday() {
  const td = S.data[S.todayKey];
  if (td) {
    S.cycles    = Number(td.cycles) || 0;
    S.shambhavi = !!td.shambhavi;
    S.bhuta     = !!td.bhuta;
    S.devi      = !!td.devi;
  }
  renderCards();
}

function hasContent(o) {
  return !!o && (o.cycles > 0 || o.shambhavi || o.bhuta || o.devi);
}
function normalizeDate(v) {
  if (!v) return '';
  if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const d = new Date(v);
  return isNaN(d) ? '' : toKey(d);
}

async function syncFromCloud() {
  if (!CFG.SCRIPT_URL || CFG.SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL') return;
  try {
    const r = await fetch(CFG.SCRIPT_URL + '?action=get');
    const j = await r.json();
    const rows = j.data || [];
    let merged = 0;

    rows.forEach(row => {
      let key, entry;
      if (Array.isArray(row)) {
        key = normalizeDate(row[0]);
        entry = {
          cycles:    Number(row[1]) || 0,
          shambhavi: row[2] === true || row[2] === 'TRUE',
          bhuta:     row[3] === true || row[3] === 'TRUE',
          devi:      row[4] === true || row[4] === 'TRUE',
        };
      } else if (row && typeof row === 'object') {
        key = normalizeDate(row.date);
        entry = {
          cycles:    Number(row.surya_cycles != null ? row.surya_cycles : row.cycles) || 0,
          shambhavi: row.shambhavi === true || row.shambhavi === 'TRUE',
          bhuta:     row.bhuta === true || row.bhuta === 'TRUE',
          devi:      row.devi === true || row.devi === 'TRUE',
        };
      }
      if (!key) return;
      // Non-destructive: never overwrite a logged local day with an empty cloud row
      if (hasContent(entry) || !hasContent(S.data[key])) {
        S.data[key] = entry;
        merged++;
      }
    });

    if (merged) {
      localStorage.setItem('sadhana-tracker-data', JSON.stringify(S.data));
      fillToday();
      renderGrid();
      updateStats();
    }
  } catch(e) {
    console.log('Cloud offline — using cached data.', e.message);
  }
}

/* ============================================================
   SAVE
   ============================================================ */
async function saveToday() {
  const btn = document.getElementById('cta');
  const msg = document.getElementById('save-msg');

  const entry = {
    date:      S.todayKey,
    cycles:    S.cycles,
    shambhavi: S.shambhavi,
    bhuta:     S.bhuta,
    devi:      S.devi,
  };

  // Local cache first — always works, the day is never lost
  S.data[S.todayKey] = entry;
  try { localStorage.setItem('sadhana-tracker-data', JSON.stringify(S.data)); }
  catch(e) { console.warn('Cache write failed:', e.message); }
  renderGrid();
  updateStats();

  if (CFG.SCRIPT_URL && CFG.SCRIPT_URL !== 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const r = await fetch(CFG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(entry),
      });
      const raw = await r.text();
      console.log('Cloud response:', raw.substring(0, 300));
      const j = JSON.parse(raw);
      if (!j.success) throw new Error(j.error || 'Server returned: ' + raw.substring(0, 80));
      msg.className = 'save-msg ok';
      msg.textContent = 'Saved ✔';
      celebrate(btn);
    } catch(e) {
      msg.className = 'save-msg err';
      msg.textContent = '✓ Saved on device · cloud sync failed';
      console.warn('Cloud save failed. Check Apps Script deployment.', e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "Shambhoo";
      setTimeout(() => { msg.textContent = ''; msg.className = 'save-msg'; }, 3500);
    }
  } else {
    msg.className = 'save-msg ok';
    msg.textContent = 'Saved ✔';
    celebrate(btn);
    setTimeout(() => { msg.textContent = ''; msg.className = 'save-msg'; }, 3500);
  }
}

function celebrate(btn) {
  btn.classList.remove('pulse');
  void btn.offsetWidth;
  btn.classList.add('pulse');
  buzz(15);
}

/* ============================================================
   HISTORY GRID
   ============================================================ */
function shortDate(date) {
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderGrid() {
  const grid     = document.getElementById('days-grid');
  const start    = parseLocal(CFG.START_DATE);
  const todayStr = todayKey();
  grid.innerHTML = '';

  // Date range label
  const endDate = new Date(start);
  endDate.setDate(endDate.getDate() + CFG.TOTAL_DAYS - 1);
  document.getElementById('history-range').textContent =
    shortDate(start) + ' – ' + shortDate(endDate);

  for (let i = 0; i < CFG.TOTAL_DAYS; i++) {
    const date    = new Date(start);
    date.setDate(date.getDate() + i);
    const key     = toKey(date);
    const num     = i + 1;
    const d       = S.data[key];
    const isToday = key === todayStr;
    const future  = key > todayStr;
    const logged  = d && (d.cycles > 0 || d.shambhavi || d.bhuta || d.devi);
    const complete = d && d.cycles >= 1 && d.shambhavi && d.bhuta && d.devi;
    const milestone = [21, 40, 48, 90, 111].includes(num);

    const card = document.createElement('div');
    card.className = 'day-card' +
      (isToday    ? ' today'     : '') +
      (future     ? ' future'    : '') +
      (milestone  ? ' milestone' : '') +
      (complete   ? ' complete'  : logged ? ' logged' : '');

    if (!future) card.onclick = () => openModal(num, key, d);

    const g = (sym, cls, on) =>
      `<svg class="dcg s-${cls}${on ? ' on' : ''}"><use href="#g-${sym}"/></svg>`;

    card.innerHTML =
      `<div class="dc-num" style="color:${isToday ? 'var(--orange)' : 'var(--dark)'}">${num}</div>` +
      `<div class="dc-date">${shortDate(date)}</div>` +
      `<div class="dc-glyphs">` +
        g('surya',     'surya',     d && d.cycles >= 1) +
        g('shambhavi', 'shambhavi', !!d?.shambhavi) +
        g('bhuta',     'bhuta',     !!d?.bhuta) +
        g('devi',      'devi',      !!d?.devi) +
      `</div>`;

    grid.appendChild(card);
  }
}

/* ============================================================
   STATS
   ============================================================ */
function updateStats() {
  const start    = parseLocal(CFG.START_DATE);
  const todayStr = todayKey();
  let done = 0, streak = 0, counting = true, shambhCt = 0, suryaTot = 0;

  for (let i = CFG.TOTAL_DAYS - 1; i >= 0; i--) {
    const date = new Date(start);
    date.setDate(date.getDate() + i);
    const key = toKey(date);
    if (key > todayStr) continue;
    const d      = S.data[key];
    const logged = d && (d.cycles > 0 || d.shambhavi || d.bhuta || d.devi);
    if (logged) {
      done++;
      if (counting) streak++;
      if (d.shambhavi) shambhCt++;
      suryaTot += (d.cycles || 0);
    } else {
      counting = false;
    }
  }

  document.getElementById('st-done').textContent      = done;
  document.getElementById('st-streak').textContent    = streak;
  document.getElementById('st-shambhavi').textContent =
    done > 0 ? Math.round((shambhCt / done) * 100) + '%' : '0%';
  document.getElementById('st-surya').textContent     = suryaTot;
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(num, key, d) {
  document.getElementById('m-title').textContent = 'Day ' + num;
  document.getElementById('m-date').textContent  =
    parseLocal(key).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  const rows = [
    { label:'Surya Kriya',         val: d ? `${d.cycles} / 3 cycles`          : '—', color:'var(--orange)',  on: d?.cycles > 0 },
    { label:'Shambhavi Mahamudra', val: d?.shambhavi ? 'Completed' : 'Not logged', color:'var(--crimson)', on: d?.shambhavi },
    { label:'Bhuta Shuddhi',       val: d?.bhuta     ? 'Completed' : 'Not logged', color:'var(--blue)',    on: d?.bhuta },
    { label:'Devi Sadhana',        val: d?.devi      ? 'Completed' : 'Not logged', color:'var(--brown)',   on: d?.devi },
  ];

  document.getElementById('m-body').innerHTML = rows.map(r => `
    <div class="modal-row">
      <div>
        <div class="modal-label">${r.label}</div>
        <div class="modal-val" style="color:${r.on ? r.color : 'var(--light)'}">${r.val}</div>
      </div>
      <div class="modal-dot" style="background:${r.on ? r.color : 'var(--muted)'}"></div>
    </div>`).join('');

  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ============================================================
   TAB SWITCHING
   ============================================================ */
function switchTab(name) {
  const isHistory = name === 'history';
  document.getElementById('view-today').classList.toggle('hidden', isHistory);
  document.getElementById('view-history').classList.toggle('hidden', !isHistory);
  document.getElementById('tab-today').classList.toggle('active', !isHistory);
  document.getElementById('tab-history').classList.toggle('active', isHistory);
  if (isHistory) { renderGrid(); updateStats(); }
}

/* ============================================================
   Header shadow — listen on the active view's scroll
   ============================================================ */
['view-today', 'view-history'].forEach(id => {
  document.getElementById(id).addEventListener('scroll', function() {
    document.getElementById('header').classList.toggle('scrolled', this.scrollTop > 8);
  }, { passive: true });
});

/* ============================================================
   PWA
   ============================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.log('SW skipped:', e.message));
  });
}

init();
</script>

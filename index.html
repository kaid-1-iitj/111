<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>111 Days Sadhana · Isha</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2A1E14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sadhana" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design Tokens ─────────────────────────────── */
    :root {
      --orange:     #EC671B;
      --terracotta: #D2691E;
      --blue:       #1B6EC8;
      --crimson:    #C83232;
      --brown:      #8B5E3C;
      --bg:         #F4EFE6;
      --card:       #FFFFFF;
      --cream:      #FCEFE0;
      --cream-2:    #F7E4CF;
      --dark:       #2A1E14;
      --mid:        #5A4A3C;
      --light:      #A6957F;
      --border:     #E7DCCB;
      --muted:      #EFE7D9;
      --success:    #2E7D32;
      --font-head:  'Roboto', sans-serif;
      --font-body:  'Open Sans', sans-serif;
      --radius:     14px;
      --shadow:     0 2px 12px rgba(90,60,30,0.06);
      --shadow-lg:  0 12px 40px rgba(90,60,30,0.16);
    }

    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    a { text-decoration: none; }

    /* ─── Header ─────────────────────────────────────── */
    .header {
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top) max(28px, env(safe-area-inset-right)) 0 max(28px, env(safe-area-inset-left));
      min-height: 64px;
      position: sticky;
      top: 0;
      z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header-brand { display: flex; align-items: center; gap: 14px; }
    .header-icon {
      width: 38px; height: 38px;
      background: var(--orange);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { display: block; }
    .header-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 17px;
      color: #fff;
      letter-spacing: 0.3px;
    }
    .header-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .header-counter { text-align: right; }
    .header-day {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 30px;
      color: var(--orange);
      line-height: 1;
    }
    .header-of {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ─── Layout ─────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: calc(100vh - 64px);
    }

    /* ─── Left Panel: Today ──────────────────────────── */
    .today-panel {
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }

    /* Hero — light, earthy, Indian folk-art */
    .hero {
      background: linear-gradient(165deg, var(--cream) 0%, var(--cream-2) 100%);
      padding: 30px 28px 26px;
      color: var(--dark);
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .hero-greeting {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--brown);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .hero-left { min-width: 0; }

    /* Live practice-mandala */
    .mandala-wrap {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }
    .mandala { width: 104px; height: 104px; display: block; overflow: visible; }
    .m-disc { fill: none; stroke: rgba(140,94,60,0.22); stroke-width: 2.4; transition: stroke 0.4s; }
    .m-dots { fill: none; stroke: rgba(140,94,60,0.20); stroke-width: 2.2; stroke-linecap: round; stroke-dasharray: 0.5 7; transition: stroke 0.4s; }
    .m-core { fill: var(--orange); opacity: 0; transform-origin: center; transition: opacity 0.5s; }
    .m-ray line {
      stroke: rgba(140,94,60,0.22);
      stroke-width: 2.6;
      stroke-linecap: round;
      transition: stroke 0.35s ease;
    }
    .m-ray.on line { stroke: var(--ray-color); }
    #ray-surya     { --ray-color: var(--orange); }
    #ray-shambhavi { --ray-color: var(--crimson); }
    #ray-bhuta     { --ray-color: var(--blue); }
    #ray-devi      { --ray-color: var(--brown); }
    .mandala.complete .m-core { opacity: 0.14; animation: bloom 0.9s ease-out; }
    .mandala.complete .m-disc { stroke: var(--orange); }
    @keyframes bloom {
      0%   { opacity: 0;    transform: scale(0.6); }
      60%  { opacity: 0.30; transform: scale(1.12); }
      100% { opacity: 0.14; transform: scale(1); }
    }
    .mandala-meter {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mm-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(140,94,60,0.22);
      transition: background 0.25s, transform 0.25s;
    }
    .mm-dot.on { transform: scale(1.15); }
    .mm-dot.on#mm-1 { background: var(--orange); }
    .mm-dot.on#mm-2 { background: var(--crimson); }
    .mm-dot.on#mm-3 { background: var(--blue); }
    .mm-dot.on#mm-4 { background: var(--brown); }
    .mm-label {
      font-size: 10px;
      color: var(--light);
      margin-left: 4px;
      font-weight: 600;
    }
    .hero-milestone {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      background: rgba(236,103,27,0.12);
      border: 1px solid rgba(236,103,27,0.3);
      border-radius: 20px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 10.5px;
      letter-spacing: 0.5px;
      color: var(--orange);
    }
    .hero-day-num {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 86px;
      line-height: 0.92;
      color: var(--orange);
      letter-spacing: -2px;
    }
    .hero-day-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--brown);
      margin-top: 8px;
      font-weight: 600;
    }
    .hero-date {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 16px;
      color: var(--dark);
      margin-top: 12px;
    }
    .hero-progress {
      margin-top: 16px;
      height: 5px;
      background: rgba(140,94,60,0.14);
      border-radius: 3px;
      overflow: hidden;
    }
    .hero-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--crimson));
      border-radius: 3px;
      transition: width 1s ease;
    }
    .hero-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-top: 8px;
    }
    .hero-pct {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 12px;
      color: var(--orange);
    }
    .hero-remaining {
      font-size: 11px;
      color: var(--light);
    }
    .hero-quote {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px dashed var(--border);
      font-size: 12.5px;
      font-style: italic;
      color: var(--mid);
      line-height: 1.7;
    }

    /* Practice Form */
    .practices {
      padding: 20px 24px;
      flex: 1;
    }
    .section-label {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--light);
    }
    .practices-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .streak-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px 3px 6px;
      background: rgba(236,103,27,0.10);
      border-radius: 20px;
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 11px;
      color: var(--orange);
    }
    .streak-flame { width: 14px; height: 14px; color: var(--orange); }
    .practice-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--muted);
    }
    .practice-row:last-child { border-bottom: none; }
    .practice-row.tappable {
      cursor: pointer;
      margin: 0 -12px;
      padding-left: 12px;
      padding-right: 12px;
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .practice-row.tappable:active { background: var(--muted); }
    .practice-row:has(input:checked) .pname { color: var(--orange); }
    .prow-main { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .pglyph {
      width: 26px; height: 26px;
      flex-shrink: 0;
      color: var(--light);
      transition: color 0.25s, transform 0.2s;
    }
    .pglyph.s-surya     { color: var(--orange); }
    .pglyph.s-shambhavi { color: var(--crimson); }
    .pglyph.s-bhuta     { color: var(--blue); }
    .pglyph.s-devi      { color: var(--brown); }
    /* glyph pops when its practice is toggled on */
    .practice-row:has(input:checked) .pglyph { transform: scale(1.12); }
    .pname {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 14.5px;
      transition: color 0.2s;
    }
    .pdesc {
      font-size: 11px;
      color: var(--light);
      margin-top: 2px;
    }

    /* Cycle counter */
    .cycle-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .cycle-row  { display: flex; align-items: center; gap: 8px; }
    .cbtn {
      width: 28px; height: 28px;
      border: 1.5px solid var(--border);
      background: transparent;
      border-radius: 50%;
      font-size: 17px;
      line-height: 1;
      color: var(--mid);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .cbtn:hover { border-color: var(--orange); color: var(--orange); }
    .cval {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 22px;
      width: 24px;
      text-align: center;
      color: var(--orange);
    }
    .cdots { display: flex; gap: 5px; }
    .cdot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s;
    }
    .cdot.on { background: var(--orange); }

    /* Toggle */
    .toggle { position: relative; width: 50px; height: 27px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .tslider {
      position: absolute; inset: 0;
      background: var(--muted);
      border-radius: 27px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .tslider::before {
      content: '';
      position: absolute;
      width: 19px; height: 19px;
      left: 4px; bottom: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
      transition: transform 0.25s;
    }
    .toggle input:checked + .tslider { background: var(--orange); }
    .toggle input:checked + .tslider::before { transform: translateX(23px); animation: knobPop 0.3s ease; }
    @keyframes knobPop {
      0%   { transform: translateX(23px) scale(1); }
      50%  { transform: translateX(23px) scale(1.25); }
      100% { transform: translateX(23px) scale(1); }
    }

    /* Save section */
    .save-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--muted);
    }
    .save-btn {
      width: 100%;
      padding: 13px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .save-btn:hover:not(:disabled) {
      background: #D45B13;
      box-shadow: 0 4px 16px rgba(236,103,27,0.35);
      transform: translateY(-1px);
    }
    .save-btn:active:not(:disabled) { transform: none; }
    .save-btn.pulse { animation: savePulse 0.5s ease; }
    @keyframes savePulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.03); box-shadow: 0 6px 22px rgba(236,103,27,0.4); }
      100% { transform: scale(1); }
    }
    .save-btn:disabled {
      background: var(--muted);
      color: var(--light);
      cursor: default;
    }
    .save-msg {
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: var(--light);
      min-height: 16px;
    }
    .save-msg.ok  { color: var(--success); }
    .save-msg.err { color: var(--crimson); }

    /* ─── Right Panel: Tracker ───────────────────────── */
    .tracker-panel {
      padding: 28px 28px 40px;
      overflow-y: auto;
    }
    .tracker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .tracker-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 19px;
    }
    .tracker-sub {
      font-size: 12px;
      color: var(--light);
      margin-top: 2px;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 12px;
      box-shadow: var(--shadow);
    }
    .stat-num {
      font-family: var(--font-head);
      font-weight: 900;
      font-size: 26px;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--light);
      margin-top: 4px;
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 20px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: var(--mid);
    }
    .leg-item .pglyph { width: 18px; height: 18px; }

    /* Grid */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(74px, 1fr));
      gap: 8px;
    }
    .day-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 7px 8px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .day-card:hover:not(.future) {
      border-color: var(--orange);
      box-shadow: 0 3px 10px rgba(236,103,27,0.15);
      transform: translateY(-1px);
    }
    .day-card.today {
      border-color: var(--orange);
      border-width: 2px;
    }
    .day-card.today::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--orange);
    }
    .day-card.future {
      opacity: 0.38;
      cursor: default;
      pointer-events: none;
    }
    .day-card.logged { background: #FCF8F1; }
    .day-card.complete {
      background: linear-gradient(160deg, #FCEFE0, #FBF6EE);
      border-color: rgba(236,103,27,0.35);
    }
    .day-card.complete .dc-num::after {
      content: '✦';
      font-size: 8px;
      color: var(--orange);
      margin-left: 3px;
      vertical-align: top;
    }
    /* Milestone days (21/40/48/90/111) get a small corner mark */
    .day-card.milestone::before {
      content: '✦';
      position: absolute;
      top: 4px; right: 5px;
      font-size: 9px;
      color: var(--crimson);
      opacity: 0.65;
      z-index: 1;
    }
    .dc-num {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      text-align: center;
      line-height: 1;
    }
    .dc-date {
      font-size: 9px;
      color: var(--light);
      text-align: center;
      margin: 2px 0 7px;
    }
    .dc-glyphs {
      display: flex;
      justify-content: center;
      gap: 4px;
    }
    .dcg {
      width: 14px; height: 14px;
      color: rgba(140,94,60,0.22);
      transition: color 0.2s;
    }
    .dcg.on.s-surya     { color: var(--orange); }
    .dcg.on.s-shambhavi { color: var(--crimson); }
    .dcg.on.s-bhuta     { color: var(--blue); }
    .dcg.on.s-devi      { color: var(--brown); }

    /* Loading */
    .spinner-wrap {
      display: flex; align-items: center; gap: 10px;
      color: var(--light); font-size: 13px;
      padding: 40px 0;
    }
    .spin {
      width: 18px; height: 18px;
      border: 2px solid var(--muted);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Modal ──────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      width: 360px;
      max-width: 100%;
      box-shadow: var(--shadow-lg);
      position: relative;
    }
    .modal-close {
      position: absolute; top: 18px; right: 18px;
      background: var(--muted); border: none;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 16px;
      color: var(--mid);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--border); }
    .modal-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 2px;
    }
    .modal-date {
      font-size: 12px;
      color: var(--light);
      margin-bottom: 20px;
    }
    .modal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--muted);
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-practice { font-family: var(--font-head); font-weight: 700; font-size: 14px; }
    .modal-val { font-size: 12px; margin-top: 2px; }
    .modal-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    /* Pre-journey / Post-journey states */
    .journey-state {
      padding: 28px;
      text-align: center;
    }
    .state-emoji { font-size: 40px; margin-bottom: 12px; }
    .state-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 8px;
    }
    .state-sub { font-size: 14px; color: var(--light); line-height: 1.6; }

    /* ─── Responsive ─────────────────────────────────── */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .today-panel {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .stats { grid-template-columns: repeat(2, 1fr); }

      /* Bigger thumb targets */
      .practice-row { padding: 16px 0; }
      .practice-row.tappable { padding-left: 12px; padding-right: 12px; }
      .toggle { width: 54px; height: 30px; }
      .toggle input:checked + .tslider::before { transform: translateX(24px); }
      .tslider::before { width: 22px; height: 22px; }
      .cbtn { width: 38px; height: 38px; font-size: 20px; }
      .cval { font-size: 24px; width: 28px; }

      /* Sticky save bar so it's always reachable */
      .save-area {
        position: sticky;
        bottom: 0;
        background: var(--card);
        box-shadow: 0 -6px 20px rgba(90,60,30,0.08);
        z-index: 10;

<!-- ═══════════════════════════════════════════════════ SCRIPT -->
<script>
/* ============================================================
   CONFIG — edit these two values before deploying
   ============================================================ */
const CFG = {
  START_DATE: '2026-06-10',       // First day of 111-day journey (YYYY-MM-DD)
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzZDXZzoJxqRMBK3hfYphg07ThIyNKclR5jyRpP7wLmxK7A6PzCuKMJDsdRFVuAoHwl/exec',  // Paste your deployed Apps Script URL here
};

/* ============================================================
   QUOTES (Sadhguru)
   ============================================================ */
const QUOTES = [
  "The most powerful thing you can do is turn inward.",
  "Yoga means to be in perfect tune with existence.",
  "Your life is your karma — make it a conscious creation.",
  "Inner engineering is the technology of turning inward.",
  "Stillness is not stagnation — it is the source of all movement.",
  "The seat of your experience is within you.",
  "If you are willing to strive, life can be a tremendous possibility.",
  "Every moment is an opportunity to transform.",
  "The quality of your life is determined by how you are within yourself.",
  "What you do is not the point — how you are is the point.",
  "You are not in the universe — the universe is in you.",
  "The mind is a powerful instrument; every thought, every emotion shapes your reality.",
  "Sadhana is not a path to some other place — it is a path to yourself.",
];

/* ============================================================
   STATE
   ============================================================ */
const S = {
  cycles: 0,
  data:   {},   // { 'YYYY-MM-DD': { cycles, shambhavi, bhuta, devi } }
  todayKey: '',
};

/* ============================================================
   DATE HELPERS
   ============================================================ */
function parseLocal(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function toKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function todayKey() { return toKey(new Date()); }
function dayNum(key) {
  return Math.round((parseLocal(key) - parseLocal(CFG.START_DATE)) / 864e5) + 1;
}
function displayDate(date) {
  return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}
function shortDate(date) {
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  S.todayKey = todayKey();
  const num   = dayNum(S.todayKey);
  const total = 111;
  const pct   = Math.max(0, Math.min(100, Math.round((num / total) * 100)));

  // Header
  const hdrNum = (num >= 1 && num <= total) ? num : (num < 1 ? '—' : total);
  document.getElementById('hdr-day').textContent = hdrNum;

  // Tracker date range
  const end = new Date(parseLocal(CFG.START_DATE));
  end.setDate(end.getDate() + 110);
  document.getElementById('tracker-range').textContent =
    shortDate(parseLocal(CFG.START_DATE)) + ' – ' + shortDate(end) + ' · 111 days';

  const remaining = Math.max(0, total - num + 1);

  if (num < 1) {
    // Before journey starts
    document.getElementById('hero-num').textContent = '—';
    document.getElementById('hero-date').textContent = displayDate(new Date());
    document.getElementById('hero-remaining').textContent =
      'Begins ' + shortDate(parseLocal(CFG.START_DATE));
    document.getElementById('hero-quote').textContent =
      '“Journey begins ' + displayDate(parseLocal(CFG.START_DATE)) + '”';
    document.getElementById('practice-form').style.opacity = '0.4';
    document.getElementById('practice-form').style.pointerEvents = 'none';
    document.getElementById('save-btn').disabled = true;
    document.getElementById('save-msg').textContent = 'Journey begins soon!';
  } else if (num > total) {
    // Journey complete
    document.getElementById('hero-num').textContent = '✓';
    document.getElementById('hero-date').textContent = '111-Day Journey Complete';
    document.getElementById('hero-remaining').textContent = 'All days done';
    document.getElementById('hero-quote').textContent = '“Well done. Now carry it forward.”';
    document.getElementById('practice-form').style.opacity = '0.4';
    document.getElementById('practice-form').style.pointerEvents = 'none';
    document.getElementById('save-btn').disabled = true;
  } else {
    // Active day
    document.getElementById('hero-num').textContent = num;
    document.getElementById('hero-date').textContent = displayDate(new Date());
    document.getElementById('hero-remaining').textContent =
      remaining + ' day' + (remaining === 1 ? '' : 's') + ' to go';
    document.getElementById('hero-quote').textContent =
      '“' + QUOTES[num % QUOTES.length] + '”';
  }

  // Greeting (time-aware)
  const h = new Date().getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('hero-greeting').textContent = greet;

  // Milestone badge
  const MILESTONES = [21, 40, 48, 90, 111];
  const mEl = document.getElementById('hero-milestone');
  if (num >= 1 && num <= total && MILESTONES.includes(num)) {
    mEl.textContent = '✦ ' + num + '-day mark';
    mEl.hidden = false;
  }

  // Progress bar + percent
  document.getElementById('hero-pct').textContent  = pct + '%';
  document.getElementById('hero-prog').style.width = pct + '%';

  // Live mandala reacts as you log
  ['t-shambhavi', 't-bhuta', 't-devi'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      buzz(10);
      updateTodayVisual();
    });
  });
  updateTodayVisual();

  loadData();
}

/* ============================================================
   LIVE TODAY VISUAL — mandala quadrants + completion meter
   ============================================================ */
function updateTodayVisual() {
  const on = {
    surya:     S.cycles >= 1,
    shambhavi: document.getElementById('t-shambhavi').checked,
    bhuta:     document.getElementById('t-bhuta').checked,
    devi:      document.getElementById('t-devi').checked,
  };
  document.getElementById('ray-surya').classList.toggle('on', on.surya);
  document.getElementById('ray-shambhavi').classList.toggle('on', on.shambhavi);
  document.getElementById('ray-bhuta').classList.toggle('on', on.bhuta);
  document.getElementById('ray-devi').classList.toggle('on', on.devi);

  const count = [on.surya, on.shambhavi, on.bhuta, on.devi].filter(Boolean).length;
  for (let i = 1; i <= 4; i++)
    document.getElementById('mm-' + i).classList.toggle('on', i <= count);
  document.getElementById('mm-label').textContent = count + ' of 4';

  const mandala  = document.getElementById('mandala');
  const wasFull  = mandala.classList.contains('complete');
  const isFull   = count === 4;
  mandala.classList.toggle('complete', isFull);
  if (isFull && !wasFull) buzz([10, 40, 10]);   // celebrate completing all four
}

/* Haptic feedback (guarded — Android only, ignored elsewhere) */
function buzz(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
}

/* ============================================================
   CYCLE COUNTER
   ============================================================ */
function adjCycles(d) {
  S.cycles = Math.max(0, Math.min(3, S.cycles + d));
  document.getElementById('cval').textContent = S.cycles;
  for (let i = 1; i <= 3; i++)
    document.getElementById('cd' + i).classList.toggle('on', i <= S.cycles);
  buzz(10);
  updateTodayVisual();
}
function setCycles(v) {
  S.cycles = Math.max(0, Math.min(3, v));
  document.getElementById('cval').textContent = S.cycles;
  for (let i = 1; i <= 3; i++)
    document.getElementById('cd' + i).classList.toggle('on', i <= S.cycles);
  updateTodayVisual();
}

/* ============================================================
   LOAD DATA
   ============================================================ */
function loadData() {
  // 1. Render instantly from localStorage cache (no waiting)
  try {
    const stored = localStorage.getItem('sadhana-tracker-data');
    if (stored) S.data = JSON.parse(stored);
  } catch(e) {
    console.warn('Cache read failed:', e.message);
  }
  fillTodayForm();
  renderGrid();
  updateStats();

  // 2. Sync from cloud in the background, then re-render
  syncFromCloud();
}

async function syncFromCloud() {
  if (!CFG.SCRIPT_URL || CFG.SCRIPT_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL') return;
  try {
    const r = await fetch(CFG.SCRIPT_URL + '?action=get');
    const j = await r.json();
    if (j.data && j.data.length) {
      j.data.forEach(row => {
        if (row[0]) {
          S.data[row[0]] = {
            cycles:    Number(row[1]) || 0,
            shambhavi: row[2] === true || row[2] === 'TRUE',
            bhuta:     row[3] === true || row[3] === 'TRUE',
            devi:      row[4] === true || row[4] === 'TRUE',
          };
        }
      });
      localStorage.setItem('sadhana-tracker-data', JSON.stringify(S.data));
      fillTodayForm();
      renderGrid();
      updateStats();
    }
  } catch(e) {
    console.log('Cloud offline — using cached data.');
  }
}

function fillTodayForm() {
  const td = S.data[S.todayKey];
  if (td) {
    document.getElementById('t-shambhavi').checked = !!td.shambhavi;
    document.getElementById('t-bhuta').checked     = !!td.bhuta;
    document.getElementById('t-devi').checked      = !!td.devi;
    setCycles(td.cycles || 0);  // setCycles() also refreshes the live mandala
  }
}

/* ============================================================
   SAVE DATA
   ============================================================ */
async function saveToday() {
  const btn = document.getElementById('save-btn');
  const msg = document.getElementById('save-msg');

  const entry = {
    date:      S.todayKey,
    cycles:    S.cycles,
    shambhavi: document.getElementById('t-shambhavi').checked,
    bhuta:     document.getElementById('t-bhuta').checked,
    devi:      document.getElementById('t-devi').checked,
  };

  // Update in-memory + cache immediately (instant, always works)
  S.data[S.todayKey] = entry;
  try {
    localStorage.setItem('sadhana-tracker-data', JSON.stringify(S.data));
  } catch(e) {
    console.warn('Cache write failed:', e.message);
  }
  renderGrid();
  updateStats();

  // Sync to Google Sheets
  if (CFG.SCRIPT_URL && CFG.SCRIPT_URL !== 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const r = await fetch(CFG.SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(entry),
      });
      const j = await r.json();
      if (!j.success) throw new Error(j.error || 'Server error');
      msg.className = 'save-msg ok';
      msg.textContent = 'Saved ✔';
      celebrateSave(btn);
    } catch(e) {
      // Cached locally, so the day is safe even if cloud failed
      msg.className = 'save-msg ok';
      msg.textContent = 'Saved (will sync when online)';
      console.log('Cloud sync deferred:', e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Today’s Practice';
      setTimeout(() => { msg.textContent = ''; msg.className = 'save-msg'; }, 2500);
    }
  } else {
    msg.className = 'save-msg ok';
    msg.textContent = 'Saved ✔';
    celebrateSave(btn);
    setTimeout(() => { msg.textContent = ''; msg.className = 'save-msg'; }, 2500);
  }
}

/* Save confirmation: button pulse + gentle haptic */
function celebrateSave(btn) {
  btn.classList.remove('pulse');
  void btn.offsetWidth;        // restart the animation
  btn.classList.add('pulse');
  buzz(15);
}

/* ============================================================
   RENDER GRID
   ============================================================ */
function renderGrid() {
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';

  const start    = parseLocal(CFG.START_DATE);
  const todayStr = todayKey();

  for (let i = 0; i < 111; i++) {
    const date    = new Date(start);
    date.setDate(date.getDate() + i);
    const key  = toKey(date);
    const num  = i + 1;
    const d    = S.data[key];
    const past   = key < todayStr;
    const today  = key === todayStr;
    const future = key > todayStr;
    const logged    = d && (d.cycles > 0 || d.shambhavi || d.bhuta || d.devi);
    const complete  = d && d.cycles >= 1 && d.shambhavi && d.bhuta && d.devi;
    const milestone = [21, 40, 48, 90, 111].includes(num);

    const card = document.createElement('div');
    card.className = 'day-card' +
      (today     ? ' today'     : '') +
      (future    ? ' future'    : '') +
      (milestone ? ' milestone' : '') +
      (complete  ? ' complete'  : (logged ? ' logged' : ''));
    card.id = 'dc-' + key;

    if (!future) card.onclick = () => openModal(num, key, d);

    const g = (sym, cls, on) =>
      `<svg class="dcg s-${cls}${on ? ' on' : ''}"><use href="#g-${sym}"/></svg>`;

    card.innerHTML =
      `<div class="dc-num" style="color:${today ? 'var(--orange)' : 'var(--dark)'}">${num}</div>` +
      `<div class="dc-date">${shortDate(date)}</div>` +
      `<div class="dc-glyphs">` +
        g('surya',     'surya',     d && d.cycles >= 1) +
        g('shambhavi', 'shambhavi', !!d?.shambhavi) +
        g('bhuta',     'bhuta',     !!d?.bhuta) +
        g('devi',      'devi',      !!d?.devi) +
      `</div>`;

    grid.appendChild(card);
  }

  // Scroll today into view
  const todayCard = document.getElementById('dc-' + todayKey());
  if (todayCard) {
    setTimeout(() => todayCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 300);
  }
}

/* ============================================================
   UPDATE STATS
   ============================================================ */
function updateStats() {
  const start    = parseLocal(CFG.START_DATE);
  const todayStr = todayKey();
  let done = 0, streak = 0, counting = true, shambhCt = 0, suryaTot = 0;

  for (let i = 110; i >= 0; i--) {
    const date = new Date(start);
    date.setDate(date.getDate() + i);
    const key = toKey(date);
    if (key > todayStr) continue;

    const d      = S.data[key];
    const logged = d && (d.cycles > 0 || d.shambhavi || d.bhuta || d.devi);
    if (logged) {
      done++;
      if (counting) streak++;
      if (d.shambhavi) shambhCt++;
      suryaTot += d.cycles;
    } else {
      counting = false;
    }
  }

  document.getElementById('st-done').textContent     = done;
  document.getElementById('st-streak').textContent   = streak;
  document.getElementById('st-shambhavi').textContent =
    done > 0 ? Math.round((shambhCt / done) * 100) + '%' : '0%';
  document.getElementById('st-surya').textContent    = suryaTot;

  // Streak badge on the today panel
  const badge = document.getElementById('streak-badge');
  if (streak > 0) {
    document.getElementById('streak-text').textContent =
      streak + '-day streak';
    badge.hidden = false;
  } else {
    badge.hidden = true;
  }
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(num, key, d) {
  document.getElementById('m-title').textContent = 'Day ' + num;
  document.getElementById('m-date').textContent  = displayDate(parseLocal(key));

  const rows = [
    { label: 'Surya Kriya',          val: d ? `${d.cycles} / 3 cycles`         : '—', color: 'var(--orange)',  on: d?.cycles > 0 },
    { label: 'Shambhavi Mahamudra',  val: d?.shambhavi ? 'Completed' : 'Not logged', color: 'var(--crimson)', on: d?.shambhavi },
    { label: 'Bhuta Shuddhi',        val: d?.bhuta     ? 'Completed' : 'Not logged', color: 'var(--blue)',    on: d?.bhuta },
    { label: 'Devi Sadhana',         val: d?.devi      ? 'Completed' : 'Not logged', color: 'var(--brown)',   on: d?.devi },
  ];

  document.getElementById('m-body').innerHTML = rows.map(r => `
    <div class="modal-row">
      <div>
        <div class="modal-practice">${r.label}</div>
        <div class="modal-val" style="color:${r.on ? r.color : 'var(--light)'}">${r.val}</div>
      </div>
      <div class="modal-dot" style="background:${r.on ? r.color : 'var(--muted)'}"></div>
    </div>
  `).join('');

  document.getElementById('overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ============================================================
   PWA — register service worker
   ============================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration skipped:', e.message));
  });
}

/* ============================================================
   START
   ============================================================ */
init();
</script>
